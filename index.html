<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Merysa - Toko Mas Premium</title>
    <!-- 📱 PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif; /* Font klasik premium */
        }

        body {
            background-color: #0c0c0c; /* Hitam pekat modern */
            color: #d4af37; /* Gold standar */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Background Overlay untuk tekstur mewah */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(45,45,45,1) 0%, rgba(0,0,0,1) 100%);
            z-index: -1;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        p {
            font-size: 1.2rem;
            color: #8a8a8a;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* Tombol Animasi Bernafas (Breathing Effect) */
        .btn-premium {
            display: inline-block;
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
            background: linear-gradient(45deg, #d4af37, #fcf6ba);
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            animation: breathing 3s ease-in-out infinite;
            border: 1px solid #aa771c;
        }

        .btn-premium:hover {
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.8);
            transform: scale(1.05);
        }

        /* Keyframes untuk Efek Bernafas */
        @keyframes breathing {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            }
            50% {
                transform: scale(1.1); /* Sedikit membesar */
                box-shadow: 0 0 50px rgba(212, 175, 55, 0.7); /* Cahaya menguat */
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            }
        }

        /* Dekorasi Tambahan */
        .gold-line {
            width: 100px;
            height: 2px;
            background: #d4af37;
            margin: 20px auto;
        }
    </style>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="gold-line"></div>
        <h1>GRAND MERYSA</h1>
        <p>Eksklusivitas dalam Setiap Kilau</p>
        
        <br>
        
        <a href="https://grandmerysa.hartok.my.id/" class="btn-premium">
            Selamat Datang di Toko Mas Grand Merysa - Klik Disini
        </a>
        
        <div class="gold-line" style="margin-top: 50px;"></div>
    </div>
<script>
// =====================================
// REGISTER SERVICE WORKER
// ==========================================
if ('servic-eWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const registration = await navigator.serviceWorker.register('/sw.js', {
        scope: '/'
      });
      console.log('[PWA] Service Worker registered:', registration.scope);

      // Auto update setiap 1 jam
      setInterval(() => {
        registration.update();
      }, 60 * 60 * 1000);

      // Detect update
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateNotification();
          }
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        console.log('[PWA] New service worker activated');
        window.location.reload();
      });

    } catch (error) {
      console.error('[PWA] Service Worker registration failed:', error);
    }
  });
}

// ==========================================
// CAPTURE INSTALL PROMPT
// ==========================================
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  console.log('[PWA] Install prompt captured');

  setTimeout(() => {
    showInstallButton();
  }, 3000);
});

// ==========================================
// TOMBOL INSTALL
// ==========================================
function showInstallButton() {
  const existingBtn = document.getElementById('installBtn');
  if (existingBtn) return;

  const installBtn = document.createElement('button');
  installBtn.id = 'installBtn';
  installBtn.innerHTML = '📲 Install App';

  installBtn.style.cssText = `
    position: fixed; bottom: 80px; left: 20px; z-index: 1500;
    background: linear-gradient(135deg, #D4AF37, #AA8C2C);
    color: #0A0A0A; border: none; padding: 12px 20px; border-radius: 25px;
    font-weight: 600; font-size: 0.85rem; cursor: pointer;
    box-shadow: 0 5px 20px rgba(212,175,55,0.4);
    display: flex; align-items: center; gap: 8px;
    font-family: 'Poppins', sans-serif;
  `;

  installBtn.onclick = () => {
    showInstallOptions();
  };

  document.body.appendChild(installBtn);

  // Auto hide
  setTimeout(() => {
    installBtn.style.opacity = '0';
    installBtn.style.transform = 'translateY(100px)';
    installBtn.style.transition = 'all 0.5s ease';
    setTimeout(() => installBtn.remove(), 500);
  }, 30000);
}

// ==========================================
// MODAL PILIHAN INSTALL
// ==========================================
function showInstallOptions() {
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
  `;

  modal.innerHTML = `
    <div style="
      background:#111;
      padding:20px;
      border-radius:15px;
      text-align:center;
      width:90%;
      max-width:300px;
      font-family:'Poppins',sans-serif;
      color:#fff;
    ">
      <h3 style="margin-bottom:15px;">Pilih Instalasi</h3>

      <button id="pwaInstall" style="
        width:100%; margin-bottom:10px;
        padding:12px; border:none;
        border-radius:10px;
        background:#D4AF37; color:#000;
        font-weight:bold;
        cursor:pointer;
      ">
        📲 Install Langsung
      </button>

      <button id="playstoreInstall" style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#0f9d58;
        color:#fff;
        font-weight:bold;
        cursor:pointer;
      ">
        ▶️ Play Store
      </button>

      <button id="closeModal" style="
        margin-top:10px;
        background:none;
        border:none;
        color:#aaa;
        cursor:pointer;
      ">Tutup</button>
    </div>
  `;

  document.body.appendChild(modal);

  // INSTALL PWA
  document.getElementById('pwaInstall').onclick = async () => {
    if (!deferredPrompt) {
      showToast('Browser tidak mendukung install langsung');
      return;
    }

    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;

    if (outcome === 'accepted') {
      console.log('[PWA] User accepted install');
      showToast('Aplikasi berhasil di-install! 🎉');
    }

    deferredPrompt = null;
    modal.remove();
  };

  // PLAY STORE (GANTI LINK INI)
  document.getElementById('playstoreInstall').onclick = () => {
    window.open('https://play.google.com/store/apps/details?id=io.grandmerysa.twa', '_blank');
  };

  // CLOSE
  document.getElementById('closeModal').onclick = () => {
    modal.remove();
  };
}

// ==========================================
// STATUS INSTALLED
// ==========================================
window.addEventListener('appinstalled', () => {
  isPWAInstalled = true;
  console.log('[PWA] App installed');
  showToast('Terima kasih telah meng-install Grad MERYSA! 💛');

  const installBtn = document.getElementById('installBtn');
  if (installBtn) installBtn.remove();
});

// ==========================================
// UPDATE NOTIFICATION
// ==========================================
function showUpdateNotification() {
  if (confirm('Versi baru tersedia! Refresh untuk update?')) {
    navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
  }
}

// ==========================================
// ONLINE / OFFLINE STATUS
// ==========================================
window.addEventListener('online', () => {
  showToast('Koneksi internet kembali! 🌐');
});

window.addEventListener('offline', () => {
  showToast('Mode offline - Data tersimpan di perangkat 📴');
});

// ==========================================
// PRECACHE
// ==========================================
if ('serviceWorker' in navigator && navigator.onLine) {
  navigator.serviceWorker.ready.then((registration) => {
    registration.active.postMessage({
      type: 'CACHE_URLS',
      urls: [
        '/#products',
        '/#hero'
      ]
    });
  });
}

console.log('[PWA] Toko Mas Grad Merysa PWA Ready');
</script>
</body>
</html>
